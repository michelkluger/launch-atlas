name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Build all binaries
        run: cargo build --release --target ${{ matrix.target }} --workspace --bins

      - name: Stage binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="launch-atlas-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          # Copy whichever launchatlas-* exist (handles .exe on Windows).
          for bin in launchatlas launchatlas-fetch-dem launchatlas-fetch-lifts \
                     launchatlas-fetch-trails launchatlas-fetch-warnings \
                     launchatlas-demo; do
            for ext in "" ".exe"; do
              src="target/${{ matrix.target }}/release/${bin}${ext}"
              if [ -f "$src" ]; then
                cp "$src" "$STAGE/"
              fi
            done
          done
          cp README.md LICENSE "$STAGE/"
          [ -f peaks-bern.json ] && cp peaks-bern.json "$STAGE/" || true
          ls -la "$STAGE"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -czvf "${STAGE}.tar.gz" "$STAGE"

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: 7z a "${STAGE}.zip" "$STAGE"

      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: |
            ${{ env.STAGE }}.tar.gz
            ${{ env.STAGE }}.zip
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.STAGE }}.tar.gz
            ${{ env.STAGE }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
